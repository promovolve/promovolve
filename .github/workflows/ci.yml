name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scala:
    name: Scala core (sbt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1

      # Hard gate — the tree is scalafmt-clean (scala3 dialect); any drift fails
      # CI. Run `sbt scalafmtAll` before committing.
      - name: scalafmt check
        run: sbt scalafmtCheckAll

      # Compile main + test sources. This catches build breaks and type errors.
      # NOTE: full `sbt test` is intentionally NOT run — the core suite has a
      # known-failing baseline (see CONTRIBUTING.md); running it here would be
      # red on arrival. Switch this to `sbt test` once that baseline is green.
      - name: Compile (main + test)
        run: sbt "compile; Test/compile"

  go:
    name: Platform (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: platform/go.mod
          cache-dependency-path: platform/go.sum
      # Scoped to ./cmd/... and the root package to avoid the Go snippets vendored
      # under */node_modules by the JS ad-bundle toolchains.
      - run: go build ./cmd/... .
      - run: go vet ./cmd/... .
      - run: go test ./cmd/... .
