# Build + deploy to the GKE cluster (the public PromoVolve deployment —
# see k8s-gke/README.md).
#
# Flow: push to main -> build the CHANGED image(s) natively on an arm64
# runner (the cluster runs ARM c4a nodes; x86 images die with exec format
# error) -> push to Docker Hub with an immutable main-<sha> tag -> point
# the GKE workloads at the new image BY DIGEST with `kubectl set image`.
#
# Deliberately NOT a manifest apply: CI never renders k8s-gke/ (the
# kustomize secretGenerator needs k8s/*.env, which stay on the laptop and
# out of GitHub). Infra/config changes deploy via `k8s-gke/setup.sh
# --deploy-only` from a machine that has them; CI only moves images.
# Consequence: the digests pinned in k8s/kustomization.yaml are the DEV
# (Docker Desktop) cluster's source of truth and a manual setup.sh deploy
# rolls GKE back to them — after CI deploys, refresh the pins before any
# manual deploy.
#
# The `:dev` tag stays laptop-owned (this workflow never writes it).
#
# Auth: GCP via Workload Identity Federation (no key material in GitHub;
# the pool's attribute condition restricts to this repo). Docker Hub via
# DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets (push scope).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild:
        description: "Force rebuild (api, platform, or both)"
        type: choice
        options: [both, api, platform]
        default: both

# Serialize deploys; never cancel a rollout mid-flight.
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # WIF: mint the GitHub OIDC token for GCP auth

env:
  API_IMAGE: docker.io/hanishi/promovolve-api
  PLATFORM_IMAGE: docker.io/hanishi/promovolve-platform

jobs:
  # Deploy is gated on the CI workflow for the SAME commit: a red
  # scalafmt/compile must not ship. (Learned 2026-07-13: a Test/compile
  # break rode Deploy to production for a day because the two workflows
  # were independent.) Polls rather than workflow_run-chains so the
  # path-filter and manual-dispatch semantics of this workflow stay
  # exactly as they are.
  ci-gate:
    name: Gate on CI (same commit)
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the CI workflow on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"
          echo "Gating deploy of $sha on the CI workflow"
          for i in $(seq 1 90); do   # up to 30 min
            line=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$sha&per_page=1" \
              -q '.workflow_runs[0] | "\(.status) \(.conclusion // "none")"' 2>/dev/null || echo "absent none")
            status="${line%% *}"; conclusion="${line##* }"
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI is green for $sha — proceeding"; exit 0
              fi
              echo "CI concluded '$conclusion' for $sha — refusing to deploy"; exit 1
            fi
            echo "CI $status… ($i/90)"; sleep 20
          done
          echo "Timed out waiting for CI on $sha — refusing to deploy"; exit 1

  changes:
    name: What changed
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api == 'true' || (github.event_name == 'workflow_dispatch' && inputs.rebuild != 'platform') }}
      platform: ${{ steps.filter.outputs.platform == 'true' || (github.event_name == 'workflow_dispatch' && inputs.rebuild != 'api') }}
      banner: ${{ steps.filter.outputs.banner == 'true' }}
      bootstrap: ${{ steps.filter.outputs.bootstrap == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # POSITIVE patterns only. With the default predicate-quantifier
            # (some), a '!'-negation matches every file OUTSIDE its glob, so
            # 'modules/**' + '!modules/**/src/test/**' made the filter match
            # ALL commits — docs-only pushes rolled both tiers (2026-07-13).
            # Test sources never ship in the image — a spec-only commit must
            # not roll the api tier — so match src/main explicitly instead
            # of excluding src/test.
            api:
              - 'modules/*/src/main/**'
              - 'build.sbt'
              - 'project/**'
              - 'Dockerfile.api'
            platform:
              - 'platform/**'
            # The delivered banner runtime. It lives UNDER platform/, so a
            # banner-only change also matches 'platform/**' and rebuilds the
            # platform image (a harmless no-op re-roll — its committed static
            # is unchanged); a '!'-exclusion here would re-introduce the
            # 2026-07-13 match-everything footgun, so we accept the overlap.
            banner:
              - 'platform/banner-component/**'
            # The publisher ad tag (bootstrap). Publishers load the STABLE
            # R2 alias (promovolve-ad.js, max-age=300), so publishing alone
            # propagates within ~5 min — no cluster roll involved. Same
            # positive-glob-only rule as above.
            bootstrap:
              - 'platform/banner-bootstrap/**'

  build-api:
    name: Build api (arm64)
    needs: [changes, ci-gate]
    # Explicit ci-gate check: a custom `if` drops the implicit success()
    # of needs, so spell it out.
    if: needs.ci-gate.result == 'success' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-24.04-arm   # native arm64 — matches the c4a nodes
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/arm64
          push: true
          tags: ${{ env.API_IMAGE }}:main-${{ github.sha }}
          # The sbt-update layer is huge; gha cache keeps rebuilds sane.
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-platform:
    name: Build platform (arm64)
    needs: [changes, ci-gate]
    if: needs.ci-gate.result == 'success' && needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: platform
          file: platform/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.PLATFORM_IMAGE }}:main-${{ github.sha }}
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

  deploy:
    name: Deploy to GKE
    needs: [changes, build-api, build-platform]
    # Run if anything was built; tolerate the other build being skipped.
    if: >-
      !cancelled() && !failure() &&
      (needs.build-api.result == 'success' || needs.build-platform.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/138573052500/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-deployer@promovolve.iam.gserviceaccount.com
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: promovolve
          location: asia-northeast1-b
          project_id: promovolve

      - name: Roll api (by digest)
        if: needs.build-api.result == 'success'
        run: |
          kubectl -n promovolve set image statefulset/promovolve-api \
            api=${API_IMAGE}@${{ needs.build-api.outputs.digest }}
          # Keep the parked singleton tier's spec current so un-parking it
          # never resurrects a stale build.
          kubectl -n promovolve set image statefulset/promovolve-singleton \
            singleton=${API_IMAGE}@${{ needs.build-api.outputs.digest }}

      - name: Roll platform (by digest)
        if: needs.build-platform.result == 'success'
        run: |
          kubectl -n promovolve set image deployment/promovolve-platform \
            platform=${PLATFORM_IMAGE}@${{ needs.build-platform.outputs.digest }}

      - name: Wait for rollout
        run: |
          if [ "${{ needs.build-api.result }}" = "success" ]; then
            kubectl -n promovolve rollout status statefulset/promovolve-api --timeout=600s
          fi
          if [ "${{ needs.build-platform.result }}" = "success" ]; then
            kubectl -n promovolve rollout status deployment/promovolve-platform --timeout=300s
          fi

  # Publish the delivered banner runtime to R2 and point the cluster at the
  # new immutable URL. This is the piece CI historically did NOT do — the
  # "R2 blind spot": a banner-component change never reached visitors without
  # a manual `npm run publish:r2` + hand-edited BANNER_SCRIPT_URL.
  #
  # Runs AFTER `deploy` so its rollout never races the image roll (the api
  # and platform both read BANNER_SCRIPT_URL, and this re-rolls them). The
  # URL is content-hashed + immutable, so the swap is safe: old impressions
  # keep serving the old bundle until their pods cycle.
  #
  # Config path: BANNER_SCRIPT_URL lives in the api-config configMap, which
  # the api (envFrom) and platform (configMapKeyRef) read. We do NOT kustomize
  # -apply it (that re-renders the whole configMap and cascade-rolls every
  # tier — see infra_apiconfig_cascade_deadlock); a targeted `set env` per
  # workload rolls only those three. k8s/kustomization.yaml stays the manual
  # dev-cluster source of truth, exactly like the image digest pins.
  #
  # Requires repo secrets: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
  # R2_SECRET_ACCESS_KEY, R2_BUCKET, CDN_BASE_URL.
  publish-banner:
    name: Publish banner → R2 + point cluster at it
    needs: [changes, ci-gate, deploy]
    if: >-
      !cancelled()
      && needs.ci-gate.result == 'success'
      && needs.changes.outputs.banner == 'true'
      && needs.deploy.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build + publish banner bundle to R2
        id: publish
        working-directory: platform/banner-component
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
        run: |
          npm ci
          npm run build
          # publish-to-r2.mjs uploads the content-hashed bundle and writes
          # url=… to $GITHUB_OUTPUT for the set-env step below.
          npm run publish:r2

      # Same WIF auth the deploy job uses — no key material in GitHub.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/138573052500/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-deployer@promovolve.iam.gserviceaccount.com
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: promovolve
          location: asia-northeast1-b
          project_id: promovolve

      - name: Point cluster BANNER_SCRIPT_URL at the new bundle
        env:
          URL: ${{ steps.publish.outputs.url }}
        run: |
          set -euo pipefail
          test -n "$URL"  # empty => CDN_BASE_URL secret missing; fail loudly
          echo "Pointing api / singleton / platform at $URL"
          # set env overrides the configMap-sourced value with a literal and
          # triggers a rollout of each workload. Singleton is parked at 0 —
          # its spec is kept current (like the image) but we don't wait on it.
          for wl in statefulset/promovolve-api statefulset/promovolve-singleton deployment/promovolve-platform; do
            kubectl -n promovolve set env "$wl" BANNER_SCRIPT_URL="$URL"
          done
          kubectl -n promovolve rollout status statefulset/promovolve-api --timeout=600s
          kubectl -n promovolve rollout status deployment/promovolve-platform --timeout=300s

  # The publisher ad tag. Bootstrap releases used to be MANUAL (npm run
  # release from a laptop with scripts/.env) — a merged tag fix that nobody
  # released was invisible-but-shipped, the exact blind spot the banner
  # publish job closed for the component (2026-07-16). Publishing writes the
  # content-hashed bundle AND the stable promovolve-ad.js alias (max-age=300)
  # that publisher HTML references, so propagation is automatic — no cluster
  # roll. Gated on deploy like the banner job: if this push also changes the
  # api tier (e.g. the tag calls a NEW endpoint), the tag must not reach
  # publishers before the endpoint exists.
  publish-bootstrap:
    name: Publish bootstrap tag → R2 (stable alias)
    needs: [changes, ci-gate, deploy]
    if: >-
      !cancelled()
      && needs.ci-gate.result == 'success'
      && needs.changes.outputs.bootstrap == 'true'
      && needs.deploy.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build + publish bootstrap to R2
        working-directory: platform/banner-bootstrap
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
        run: |
          npm ci
          # Full release checks, then publish. No fanout: it rewrites the
          # committed example-site copies, which stay a local-dev concern.
          # publish-to-r2.mjs skips its scripts/.env write when the file is
          # absent (CI), and the stable alias makes URL plumbing a no-op.
          npm run typecheck
          npm run lint
          npm run test
          npm run build
          npm run publish:r2
