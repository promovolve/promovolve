# GCE L7 health checks. Container-native (NEG) health checks probe the Pod IP
# on the port named here, independent of the Service's serving port.
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: api-backendconfig
spec:
  healthCheck:
    type: HTTP
    # Pekko management /ready — 200 once the pod is a cluster member. The
    # serving port :8080 exposes only /v1/... (no health route), so we probe
    # the management port instead.
    requestPath: /ready
    port: 8558
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
  # Ad-serve/tracking beacons are short; keep the default backend timeout.
  timeoutSec: 30
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: platform-backendconfig
spec:
  healthCheck:
    type: HTTP
    requestPath: /health
    port: 9090
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
