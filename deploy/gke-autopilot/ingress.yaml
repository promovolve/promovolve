# The single L7 HTTP(S) load balancer — replaces both base LoadBalancer
# Services. Host-based routing:
#   promovolve.programmer.llc → platform dashboard (:9090)
#   ads.programmer.llc        → api ad-serve + tracking (:8080)
#
# global-static-ip-name pins a stable public IP so DNS survives Ingress
# recreation. Reserve it first (README) or delete that annotation to let GKE
# assign an ephemeral IP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: promovolve
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "promovolve-ip"
    networking.gke.io/managed-certificates: "promovolve-cert"
    networking.gke.io/v1beta1.FrontendConfig: "promovolve-frontend"
spec:
  rules:
    - host: promovolve.programmer.llc
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: promovolve-platform
                port:
                  number: 9090
    - host: ads.programmer.llc
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: promovolve-api
                port:
                  number: 8080
