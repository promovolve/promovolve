# One Google-managed cert covering both public hosts (SANs on a single cert).
# Provisioning takes ~15-60 min after the Ingress has a public IP AND DNS A
# records point at it — the cert stays "Provisioning" until Google can validate
# each domain over HTTP/DNS. Watch:
#   kubectl -n promovolve get managedcertificate promovolve-cert -w
#
# Hosts match the base config (RP_ID / TRACKING_BASE_URL). Change both here and
# in the base configMap if you demo under different domains.
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: promovolve-cert
spec:
  domains:
    - promovolve.programmer.llc
    - ads.programmer.llc
