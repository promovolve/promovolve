# Go platform/BFF → Spot Pod. Bumped to Autopilot's floor: minimum 250m CPU,
# and memory request must be raised to (or above) the limit — the base 64Mi
# request / 256Mi limit is below Autopilot's minimum, so we set 250m / 512Mi
# with request == limit.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: promovolve-platform
spec:
  template:
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: platform
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              memory: 512Mi
