# api Service: LoadBalancer → ClusterIP, fronted by the shared Ingress.
#
# - cloud.google.com/neg makes it a container-native (NEG) backend so the L7 LB
#   sends traffic straight to Pod IPs.
# - backend-config attaches api-backendconfig, whose health check hits the
#   management port :8558/ready — the serving port :8080 has NO health route
#   (only /v1/...), so a default "GET / on :8080" check would 404 and mark the
#   backend permanently unhealthy.
#
# sessionAffinity: ClientIP (from the base) is preserved: it still pins the
# in-cluster BFF→api ClusterIP traffic. With replicas:1 it's moot, but it keeps
# the base's intent if you scale back up.
apiVersion: v1
kind: Service
metadata:
  name: promovolve-api
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "api-backendconfig"}'
spec:
  type: ClusterIP
