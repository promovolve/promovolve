# platform Service: LoadBalancer → ClusterIP, fronted by the shared Ingress.
# Health check (platform-backendconfig) hits :9090/health, which returns 200
# {"status":"ok"} unauthenticated (exempt from both the setup gate and the
# session guard) — the default "GET /" would 302 to /login and fail the check.
apiVersion: v1
kind: Service
metadata:
  name: promovolve-platform
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "platform-backendconfig"}'
spec:
  type: ClusterIP
