# GKE app-tier overlay: api pods host shards (entity), HTTP (api), and the
# LP-worker (crawler role — LPWorker sharding is pinned to it; without it,
# generate-from-LP silently times out). NO "singleton": on the multi-node
# shape the cluster singletons live on the dedicated promovolve-singleton pod
# so api rollouts never migrate them.
include classpath("application")

pekko.cluster.seed-nodes = []
pekko.cluster.roles = ["entity", "api", "crawler"]
