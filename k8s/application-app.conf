# App-tier config overlay — mounted into the promovolve-api pods and loaded via
# -Dconfig.file=/conf/application-app.conf. Pulls in the image's bundled
# application.conf, empties seed-nodes so Cluster Bootstrap (Kubernetes
# discovery) forms/joins the cluster, and pins the roles to a proper HOCON list.
#
# ALL ROLES CONSOLIDATED onto the api pods (2026-07-02) — the cluster is now
# just the 2 api replicas:
#
# - "crawler" folded in: the dedicated crawler tier isolated the heavy
#   CONTINUOUS site-crawl load, but site crawling was removed (on-demand
#   classification); the LP-worker that remained (occasional, advertiser-
#   triggered Playwright LP analysis) runs fine here, browsers lazy-launched.
# - "singleton" folded in: the dedicated singleton tier was a band-aid for
#   api-roll singleton migration wedging CampaignDirectory registration; the
#   real fix (`371e058b`: ask→tell + async ack + backoff re-tell + durable
#   demandCategories cache) made migration a self-healing blip, so the tier's
#   cost (a 3rd JVM starving the shared dev VM) outweighed its benefit.
#   Singletons run on the older api pod and migrate on rolls — acceptable.
#
# SBR note: 2 entity nodes = even count; keep-majority breaks a 1-vs-1 split
# by lowest address (one side always survives). A dedicated singleton pod
# (odd entity count 3) remains the better shape for REAL multi-node infra —
# see singleton-statefulset.yaml (kept at replicas: 0 for that purpose).
include classpath("application")

pekko.cluster.seed-nodes = []
pekko.cluster.roles = ["singleton", "entity", "api", "crawler"]
