# SINGLE-NODE config overlay — one pod carries ALL cluster roles
# (singleton + entity + api) and forms a cluster of one. Loaded via
# -Dconfig.file=/conf/application-single.conf on the (replicas:1) api pod.
#
# Why: on this Docker-Desktop box the multi-node cluster could not reliably
# re-converge after a transient — a node would be marked unreachable, SBR
# downed it, and a downed node can't rejoin (crash loop). A single member has
# no peers to lose, no SBR decision to make, and no shard coordinator to
# disturb when a site is added — so it is trivially stable. Multi-node + SBR
# remains a separate, deliberate exercise for a larger/real cluster.
#
# Roles match the image's built-in single-node dev default. seed-nodes is
# emptied so Cluster Bootstrap forms the cluster; the pod sets
# PEKKO_BOOTSTRAP_REQUIRED_CONTACT_POINTS=1 so one discovered contact point
# (itself) is enough to form.
include classpath("application")

pekko.cluster.seed-nodes = []

# DEV GUARDRAIL (currently OFF): serialize-messages = on would force every
# message through full serialize/deserialize even single-node, catching
# non-round-trippable messages at first use in dev instead of as multi-node
# transport carnage (see LPWorkerSerializationSpec for the bare-tuple null
# poison it would have caught). BUT it also checks LOCAL-ONLY self-messages
# (timer ticks etc.) and DROPS them on failure — first boot with it flagged
# CreativeProcessor.ScanPending, silently breaking that worker. Enable only
# after sweeping local-only protocols with NoSerializationVerificationNeeded.
# pekko.actor.serialize-messages = on
# "crawler" is REQUIRED: the LPWorker shard region (Playwright LP analysis
# for creative generation) is role-pinned to it — without it, generate-from-LP
# times out silently (shard messages buffer against a role nobody carries).
pekko.cluster.roles = ["singleton", "entity", "api", "crawler"]
