# Singleton-tier config overlay — mounted into the promovolve-singleton pod and
# loaded via -Dconfig.file=/conf/application-singleton.conf. Pulls in the image's
# bundled application.conf, empties seed-nodes so Cluster Bootstrap (Kubernetes
# discovery) forms/joins the cluster, and pins the roles to a proper HOCON list
# (PEKKO_CLUSTER_ROLES as an env var can't express a list).
#
# This is the ONLY node carrying the "singleton" role, so the cluster singletons
# (CampaignDirectory, CategoryRegistry, Gemini rate limiter) have a STABLE home:
# rolling the api/crawler tiers no longer migrates them, so campaign→directory
# registration can't hit a singleton-in-handover timeout window on ordinary
# deploys. It also keeps the "entity" role so it hosts shards and counts toward
# the odd entity-role quorum (1 singleton + 2 api = 3 entity-role nodes).
include classpath("application")

pekko.cluster.seed-nodes = []
pekko.cluster.roles = ["singleton", "entity"]
