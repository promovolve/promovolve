apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: promovolve

resources:
  - namespace.yaml
  - db-statefulset.yaml
  - db-service.yaml
  - api-rbac.yaml
  - api-statefulset.yaml
  - api-service.yaml
  - singleton-statefulset.yaml
  - pdb.yaml
  - platform-deployment.yaml
  - platform-service.yaml

configMapGenerator:
  # init-db.sql straight from the repo — single source of truth, no copy.
  - name: db-initdb
    files:
      - init.sql=../docker/init-db.sql

  # App-tier overlay (roles=[entity,api,crawler] — the dedicated crawler tier
  # was REMOVED 2026-07-02: site crawling is gone, and the LP-worker it hosted
  # is sporadic, so it runs on the api pods now; singletons stay on the
  # dedicated promovolve-singleton pod). Replaces application-k8s.conf here.
  - name: app-conf
    files:
      - application-app.conf
      # Single-node overlay (all roles on one pod) — the api tier loads this
      # via -Dconfig.file when run at replicas:1 for a stable one-member cluster.
      - application-single.conf
      # TEMP debug logging (bootstrap-deadlock diagnosis) — see logback-debug.xml.
      - logback-debug.xml

  # Singleton-tier overlay (roles=[singleton,entity]) — the dedicated, stable
  # home for the cluster singletons so api/crawler rolls don't migrate them.
  - name: singleton-conf
    files:
      - application-singleton.conf
      # TEMP debug logging (bootstrap-deadlock diagnosis) — see logback-debug.xml.
      - logback-debug.xml

  - name: api-config
    literals:
      # Public R2 origin creative asset srcs are built from (NOT a secret) —
      # tracked here so deploys are reproducible from committed config. The API
      # (envFrom) and platform (configMapKeyRef) both read it. Must be the public
      # CDN/R2 host the VIEWER's browser can reach, not localhost.
      - CDN_BASE_URL=https://pub-7ab486148c8740dbb2cc31c5072eb91c.r2.dev
      # Public HTTPS URL the VIEWER's browser uses to POST impression/click/CTA
      # beacons. ServeRoutes embeds this server-side into each served banner, so
      # it must be the tunnel host (same as the demo bootstrap's apiBase), NOT
      # localhost — a remote/HTTPS viewer can't reach localhost (and HTTP beacons
      # from the HTTPS page are mixed-content blocked). Wrong value here = ads
      # render but "No deliveries recorded" (no tracking events ingested).
      - TRACKING_BASE_URL=https://ads.programmer.llc/v1
      - JDBC_URL=jdbc:postgresql://promovolve-db:5432/promovolve
      - JDBC_USER=promovolve
      - DDATA_DIR=/data/ddata
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - ENABLE_TEST_ROUTES=false
      # Cluster Bootstrap quorum — minimum management contact points that must
      # be discovered before a NEW cluster forms. The cluster is now just the
      # 2 all-roles api pods; requiring both means a lone pod can never form
      # a standalone cluster, so exactly one cluster ever exists.
      # If you change the member count, set this to the new majority ⌊total/2⌋+1.
      - PEKKO_BOOTSTRAP_REQUIRED_CONTACT_POINTS=2
      # Lets headless Chromium start as root in a container (see BrowserSession.scala).
      - CHROMIUM_NO_SANDBOX=true
      # LP-worker ShardedDaemonProcess sizing (hash(siteId)%N addressing). The
      # N worker shards are role-pinned to "crawler", which the api pods now
      # carry (the dedicated crawler tier was deleted 2026-07-02).
      - CRAWLER_NUM_WORKERS=4
      # Demo responsiveness tweaks. NOTE: we deliberately do NOT set
      # SIM_DAY_DURATION_SECONDS — pacing uses a real 24h day (sim.day=86400).
      # A short sim-day looks helpful ("compress the budget day so low-traffic
      # demos serve") but is a trap: once the first short day elapses (always,
      # since the cluster runs far longer than a few minutes), a stale campaign
      # dayStart makes pacing read remainingHours<=0 → permanent hard-stop
      # (throttle 99%, spendRatio 0.00) → NO fill. On a real 24h day a low-traffic
      # demo is always *behind* pace → throttle 0% → serves freely, and
      # CampaignEntity rolls itself off calendar dates (no stale-dayStart trap).
      # For a *watchable* pacing test, set a short sim-day at RUNTIME via
      #   PUT /v1/publishers/{pub}/sites/{site}/pacing {"dayDurationSeconds": N}
      # which force-resets dayStart fresh for the site and its campaigns.
      # Fast floor observations keep the demo UI responsive (doesn't depend on a
      # compressed day). Re-auction is intentionally NOT overridden here: it
      # falls back to application.conf's 5-minute default. The periodic pass is
      # only a background refresh (recent-page re-auction, floor/CTR/pricing
      # refresh, empty-cache re-crawl) — discrete changes (approve/pause/exhaust)
      # already trigger an immediate event-driven re-auction — so 30s was pure
      # demo responsiveness and just added auction + DData churn. Set
      # REAUCTION_INTERVAL here only if you want a non-default cadence.
      # Floor-optimizer observation cadence. Was pinned to 5s (a sim/test
      # leftover) which made every SiteEntity persist + sweep every 5s — a
      # constant background load that, with >1 site, kept tripping VM-wide
      # heartbeat stalls on the dev box. But the sweep's WHOLE duty cycle
      # is counted in ticks (8 candidates x 4 ticks probing + 60 ticks
      # exploit), so at the 900s production default one sweep = 8 HOURS
      # and the hold phase = 15 — the dashboard reads as frozen. 60s keeps
      # the dev cluster watchable (sweep ~32 min, hold ~1 h) at 1/12th of
      # the old 5s load. Production wants 900 WITH the tick counts
      # recalibrated, not this.
      - FLOOR_OBSERVATION_INTERVAL_SECONDS=60
      # Public URL of the <expandable-magazine-banner> web component on R2.
      # NOT a secret — tracked here so deploys are reproducible from committed
      # config. The API (envFrom) and platform (configMapKeyRef) both read it;
      # update on each `banner-component` R2 publish (npm run publish:r2).
      - BANNER_SCRIPT_URL=https://pub-7ab486148c8740dbb2cc31c5072eb91c.r2.dev/js/expandable-magazine-banner.63b5af7304.js
      # Gemini rate limiter (GeminiRateLimiter.scala reads these from env).
      # Defaults are sized for the AI Studio FREE tier (8 RPM / burst 5), which
      # makes a multi-page crawl queue past the 30s acquire deadline → pages
      # fall back to 9 generic categories @ conf 0.25 (silent misclassification).
      # These values target a PAID/Tier-1 key (1000 RPM). Bump for Tier 2/3.
      - GEMINI_TOKENS_PER_MINUTE=1000
      - GEMINI_BURST=50

  - name: platform-config
    literals:
      - LISTEN_ADDR=:9090
      - CORE_API_URL=http://promovolve-api:8080
      - DATABASE_URL=postgres://promovolve:promovolve@promovolve-db:5432/promovolve?sslmode=disable
      # Restrict CORS to the public origin instead of "*" — the BFF only
      # echoes Access-Control-Allow-Origin when the request Origin matches
      # this, and adds HSTS / X-Frame-Options / nosniff on every response.
      # Empty/unset falls back to the permissive "*" used for local dev.
      - ALLOWED_ORIGIN=https://promovolve.programmer.llc
      # WebAuthn Relying Party — passkeys are bound to this domain FOREVER;
      # changing it invalidates every registered passkey. Must match the
      # public host the dashboard is served from. A non-localhost RP_ID also
      # marks session cookies Secure. DEV_AUTH is deliberately never set here
      # (password auth stays off in deployments).
      - RP_ID=promovolve.programmer.llc
      - RP_ORIGINS=https://promovolve.programmer.llc

secretGenerator:
  - name: db-secret
    literals:
      - POSTGRES_USER=promovolve
      - POSTGRES_PASSWORD=promovolve
      - POSTGRES_DB=promovolve

  # JDBC_PASSWORD + GEMINI_API_KEY + R2_* (all required) + CDN/banner URLs live here.
  # Copy k8s/secrets.env.example -> k8s/secrets.env and fill it in.
  - name: api-secret
    envs:
      - secrets.env

  # JWT_SECRET lives here — a repo literal would let anyone who reads the
  # source forge an admin session cookie and bypass the passkey gate
  # entirely. Copy k8s/platform-secrets.env.example -> k8s/platform-secrets.env
  # and generate a strong value. Rotating it signs everyone out (harmless).
  - name: platform-secret
    envs:
      - platform-secrets.env

# Point at the images pushed to Docker Hub (private repos under `hanishi`).
images:
  - name: promovolve/api
    newName: docker.io/hanishi/promovolve-api
    # LP-original font re-hosting (opt-in): analysis captures the LP's
    # own woff2 files + @font-face rules (FontFaceParser), quarantines
    # them at fonts/orig/<hash>.woff2, and surfaces originalFonts offers;
    # at publish, CreateCreativeRequest.lpFonts (license consent) makes
    # CreativeProcessor copy them to the live catalog key BEFORE the
    # banner render. Rides on the earlier hero-screenshot font fix.
    # + LP-flow loggers back to INFO (analyze/publish visible in kubectl).
    # + lpFonts is Option (spray jsonFormatN ignores defaults — the plain
    #   Vector made it a REQUIRED member and 400'd every publish/draft
    #   silently via corePost's status-blind proxying).
    # + font quarantine shared with the in-process analyze path
    #   (lp-workers.enabled=false default meant offers never surfaced).
    # + quarantine no-offers diagnostic (families/faces/captured URLs) +
    #   failure belt (font offers can never fail an analysis).
    digest: sha256:5ee2d31624e95e8e70ed4728726bb20cacc816a10498bf3d9f291c956ca75ea7
  - name: promovolve/platform
    newName: docker.io/hanishi/promovolve-platform
    # Org membership: one org per email domain owns the core entities;
    # dual-role orgs with side switcher, same-domain invites (cap 3),
    # co-admins, org-admin-only money pages, audit_log attribution, and
    # read-only admin view-as. Freemail/claimed-domain signup gates.
    # + admin billing pages resolve entities via orgs (a side claimed by an
    #   org side-request has no user row — top-ups were impossible for it).
    # + dead API-key feature + raw /api/v1/users/me removed (dormant
    #   user-row-scan landmines; api_keys table dropped by migration).
    # + SessionGuard DB-verifies before enforcing (stale post-reset cookie
    #   403'd /setup), org-based billing labels, platform-admin invites.
    # + users page: org-side Role badges + operator hard delete (frees
    #   email/domain); clipboard buttons on links + verification values.
    # + view-as UX: mutating controls inert via CSS; styled guard page
    #   with Exit view (was a bare http.Error text page).
    # + fresh logins land on org_members.preferred_side (last-used side,
    #   written on switch), seeded at membership creation.
    # + platform_users.role is a pure grant (admin|user), never a side;
    #   requested_side carries what a pending request asked for.
    # + view-as inerts mutation ENTRY points too (Add Site / New Campaign /
    #   Create Creative) via data-viewas-block.
    # + view-as targets org ADMINS only, rendering their true view (the
    #   role override once grew an Earnings menu on a member's view).
    # + top-up history is an operator table (who/amount/ref); journal legs
    #   read as possessives ("X's advertiser wallet"), customer leg first.
    # + journal redesign: sentence summaries + expandable legs + kind
    #   chips; adjustment widget self-explains credit/charge/refund.
    # + top-up picker shows org labels only (ULID stays in option value).
    # + top-up/adjustment account pickers are searchable comboboxes backed
    #   by Postgres search (/api/billing/accounts, admin-only).
    # + view-as inerts the Add-passkey button (JS-fetch ceremony).
    # + creative preview dialog: top-aligned scroll body (PC/Mobile
    #   switcher was clipped above the scroll range), slimmer chrome.
    # + compiled Tailwind (Play CDN removed; rebuild static/tailwind.css
    #   via scripts/build-tailwind.sh on template class changes) and
    #   immutable content-hashed /static caching via the asset helper.
    # + Tailwind compiled IN-IMAGE (Dockerfile css stage) — deploys can
    #   never ship stale styles; the script remains for local go run.
    # + in-app Help pages: docs/guides rendered via goldmark (embedded
    #   copies, drift-guarded by help_sync_test.go / sync-help.sh).
    # + inbox teasers clone-reconnect on reveal (Chromium keeps cq units
    #   at viewport fallback for elements rendered display:none).
    # + preview dialogs opt into the banner slot-size tour (banner bundle
    #   780fae0bb6: slot-tour + hidden-connect self-heal).
    # + designer: text dropped on a sized canvas (local, fieldless) is now
    #   editable in place; field-bound text in a size gains a "Synced
    #   across all sizes" checkbox (untick = bake local override, retick =
    #   relink to the shared page field).
    # + LP-original font opt-in (wizard license checkbox → lpFontsJson →
    #   core activation), autofit font-sync retry + edit-entry reconcile
    #   (no more text-enlarges-on-click), Layers "Scrim" label, Expanded
    #   chip says "full screen" instead of 540×960.
    # + autofit font-sync writes field-bound reader sizes to ALL pages
    #   (page-1-master subscriber was reverting page-2/3 writes — the
    #   remaining enlarge-on-click).
    # + brand-kit edits persist: loadBrandKit prefers localStorage over the
    #   wizard-injected seed (modal saves were shadowed); wizard re-seed
    #   preserves the modal-saved logoUrl.
    digest: sha256:a37810b31f57f7114a7e9a869520df34bd0f4ad5b4ff984eb193f5ec9478d887
