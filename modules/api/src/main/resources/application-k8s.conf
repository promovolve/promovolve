# Kubernetes overlay — loaded via -Dconfig.resource=application-k8s.conf
# (set in the api pod spec). Pulls in the full application.conf, then
# clears the static loopback seed-nodes so Pekko Cluster Bootstrap forms
# the cluster via Kubernetes API discovery instead. Without this, each pod
# would self-join on 127.0.0.1 and bootstrap would be a no-op.
include "application"

pekko.cluster.seed-nodes = []
