# ========================================
# PromoVolve - Pekko Cluster Configuration
# ========================================

pekko {
  loglevel = "ERROR"
  loglevel = ${?LOG_LEVEL}

  http.server {
    # LP extraction (fetch + Gemini + image downloads) can take 60s+
    request-timeout = 120s
    idle-timeout = 150s
  }

  # Advertiser asset uploads ship video backgrounds as multipart POST
  # bodies. Pekko-HTTP's default parsing cap is 8 MiB, which truncates
  # every realistic video upload silently. Bump both server and client
  # parsers so the upload round-trip clears 200 MB end-to-end.
  http.parsing.max-content-length = 200m
  http.server.parsing.max-content-length = 200m
  http.client.parsing.max-content-length = 200m

  # ----------------------------------------
  # Actor System
  # ----------------------------------------
  actor {
    provider = "cluster"

    # Cluster message serialization.
    # - jackson-cbor: legacy + persistence (events/state must stay readable).
    # - proto-scalapb: the TARGET wire format for transport messages (Phase 1
    #   migration in progress) — schema-defined protos can't silently
    #   deserialize to null the way reflective Jackson can (see the Tuple2
    #   tombstone below). New cross-node reply/command types should be protos
    #   under modules/core/src/main/protobuf/.
    serializers {
      jackson-cbor  = "org.apache.pekko.serialization.jackson.JacksonCborSerializer"
      proto-scalapb = "promovolve.serialization.ScalapbSerializer"
    }

    serialization-bindings {
      "promovolve.CborSerializable" = jackson-cbor
      "scalapb.GeneratedMessage"    = proto-scalapb
      # Bare primitive reply types used in a few entity asks
      # (e.g. GetFloorCpm -> CPM, GetBidWeight -> Double). These can't extend
      # CborSerializable, but round-trip safely via Jackson (no inner object
      # types to lose). Collection/Option-of-object replies are NOT bound here
      # (element types would be lost) — those are wrapped in case classes.
      #
      # "scala.Tuple2" was REMOVED (2026-07-02) and must NEVER return:
      # specialized tuples ((Double, Double) = Tuple2$mcDD$sp) silently
      # DESERIALIZE TO NULL under jackson-cbor, and Artery kills its whole
      # inbound stream (cluster heartbeats included) on a null message —
      # this was the root cause of the multi-node self-down cascades
      # (reproduced on GKE; regression: LPWorkerSerializationSpec). Unbound,
      # an accidental tuple send now fails LOUDLY at the sender instead.
      # Wrap tuple-shaped replies in case classes.
      "java.lang.Double"      = jackson-cbor
      "java.lang.Boolean"     = jackson-cbor
      "scala.math.BigDecimal" = jackson-cbor
    }

    # Allow java serialization for development (disable in production)
    allow-java-serialization = off
  }

  # ----------------------------------------
  # Remote (Artery)
  # ----------------------------------------
  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?PEKKO_HOST}
      port = 25520
      port = ${?PEKKO_PORT}
    }

    # Bind to all interfaces (useful in containers)
    bind {
      hostname = "0.0.0.0"
      hostname = ${?PEKKO_BIND_HOST}
      port = ""
      port = ${?PEKKO_BIND_PORT}
    }

    advanced {
      # Increase for high-throughput scenarios
      maximum-frame-size = 256 KiB
      buffer-pool-size = 128
    }
  }

  # ----------------------------------------
  # Cluster
  # ----------------------------------------
  cluster {
    # Node roles determine behavior:
    #   - "singleton": Hosts cluster singletons
    #   - "entity": Hosts sharded entities
    #   - "api": Runs HTTP server
    # Default: all roles for single-node development
    roles = ["singleton", "entity", "api"]
    roles = ${?PEKKO_CLUSTER_ROLES}

    # Seed nodes for cluster formation
    # In production, use Kubernetes discovery or DNS
    seed-nodes = ["pekko://promovolve@127.0.0.1:25520"]
    seed-nodes = ${?PEKKO_SEED_NODES}

    # Split-brain resolver (required for production)
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

    split-brain-resolver {
      active-strategy = keep-majority
      stable-after = 20s
      # Decide the majority by ENTITY-role members only, NOT total node count.
      # The app/entity tier runs an odd replica count (k8s: 3) while the crawler
      # tier scales independently. A *global* majority would let a partition
      # that isolates the entity nodes from a larger pile of crawlers down the
      # only nodes that host sharded entities + cluster singletons (the only ones
      # that can serve). Scoping to role=entity makes the decision purely about
      # the serving tier: the side holding the entity majority (e.g. 2 of 3)
      # survives, the minority self-downs and rejoins, and isolated crawlers
      # (0 entity members) always lose. Matches sharding.role above. (No-op for
      # all-roles dev nodes — single member, no partition.)
      keep-majority {
        role = "entity"
      }
    }

    # Cluster sharding configuration
    sharding {
      # Pin shard regions AND the shard coordinator to entity-role nodes.
      # Without this, on a multi-tier cluster the coordinator can drift onto
      # a non-entity node (e.g. a dedicated crawler) during a restart and
      # wedge shard allocation. All-in-one dev nodes have the "entity" role,
      # so this is a no-op there.
      role = "entity"

      # Number of shards - should be 10x expected max nodes
      number-of-shards = 100

      # Remember entities across restarts using Distributed Data
      remember-entities = on
      remember-entities-store = ddata

      # Rebalance settings
      least-shard-allocation-strategy {
        rebalance-absolute-limit = 20
        rebalance-relative-limit = 0.1
      }

      # Passivation strategy (replaces deprecated passivate-idle-entity-after)
      passivation {
        default-idle-strategy {
          idle-entity.timeout = 5 minutes
        }
      }
    }

    # Failure detector tuning
    failure-detector {
      acceptable-heartbeat-pause = 10s
      heartbeat-interval = 1s
      threshold = 12.0
    }

    # ----------------------------------------
    # Distributed Data (DData)
    # ----------------------------------------
    distributed-data {
      # Gossip interval for data replication
      gossip-interval = 2s

      # How often subscribers are notified of changes
      notify-subscribers-interval = 500ms

      # Maximum entries per gossip round
      max-delta-elements = 500

      # Durable storage for DData
      # NOTE: Requires JVM flags for Java 21+:
      #   --add-opens java.base/java.nio=ALL-UNNAMED
      #   --add-opens java.base/sun.nio.ch=ALL-UNNAMED
      durable {
        # Keys matching these patterns are persisted to LMDB
        keys = [
          # Remember-entities: sharded entity IDs survive restarts
          # Format: shard-{entity-type}-{shard-id}-{version}
          "shard-*",
          # Exhausted campaigns: budget-depleted campaigns filtered by AdServer
          "exhausted-campaigns",
          # ServeIndex: approved creative CandidateViews for /serve hot path
          # Format: serve-views-{siteId}-{bucket}
          "serve-views-*"
        ]
        keys = ${?DDATA_DURABLE_KEYS}

        # LMDB storage backend
        store-actor-class = "org.apache.pekko.cluster.ddata.LmdbDurableStore"

        lmdb {
          dir = "target/ddata"
          dir = ${?DDATA_DIR}
          # Upper bound on the memory-mapped file. LMDB only
          # allocates pages as data is written, so sizing this
          # generously costs nothing at rest. ServeIndex grows with
          # sites × urls × slots × candidates, so 100 MiB fills up
          # quickly under real traffic.
          map-size = 1 GiB
          map-size = ${?DDATA_LMDB_MAP_SIZE}
          write-behind-interval = 200ms
        }
      }

      # Pruning of removed entries
      pruning {
        interval = 120s
        max-pruning-dissemination = 300s
      }
    }
  }

  # ----------------------------------------
  # Persistence (DurableState)
  # ----------------------------------------
  persistence {
    state.plugin = "jdbc-durable-state-store"
    snapshot-store.plugin = "jdbc-snapshot-store"

    # Journal not used (we use DurableStateBehavior, not EventSourced)
    journal.plugin = "pekko.persistence.journal.inmem"
  }
}

# ========================================
# JDBC Durable State Store (PostgreSQL)
# ========================================
jdbc-durable-state-store {
  slick {
    profile = "slick.jdbc.PostgresProfile$"

    db {
      url = "jdbc:postgresql://localhost:5432/promovolve"
      url = ${?JDBC_URL}

      user = "promovolve"
      user = ${?JDBC_USER}

      password = "promovolve"
      password = ${?JDBC_PASSWORD}

      driver = "org.postgresql.Driver"

      # Connection pool
      numThreads = 20
      maxConnections = 20
      minConnections = 5
      connectionTimeout = 5000

      # Connection validation
      connectionTestQuery = "SELECT 1"
    }
  }

  tables {
    durable_state {
      tableName = "durable_state"
      schemaName = "public"
      columnNames {
        persistenceId = "persistence_id"
        revision = "revision"
        statePayload = "state_payload"
        stateSerId = "state_ser_id"
        stateSerManifest = "state_ser_manifest"
        tag = "tag"
        stateTimestamp = "state_timestamp"
      }
    }
  }
}

jdbc-snapshot-store {
  slick = ${jdbc-durable-state-store.slick}

  tables {
    snapshot {
      tableName = "snapshot"
      schemaName = "public"
      columnNames {
        persistenceId = "persistence_id"
        sequenceNumber = "sequence_number"
        created = "created"
        snapshot = "snapshot"
        metadata = "metadata"
      }
    }
  }
}

# ========================================
# Pekko Projection (Dashboard Read-Side)
# ========================================
pekko.projection {
  # Use Slick for offset storage
  slick {
    profile = "slick.jdbc.PostgresProfile$"
    db = ${jdbc-durable-state-store.slick.db}

    # Offset store table names
    offset-store {
      table = "projection_offset_store"
      management-table = "projection_management"
    }
  }

  # Restart settings for projection recovery
  restart-backoff {
    min-backoff = 3s
    max-backoff = 30s
    random-factor = 0.2
    max-restarts = 5
    max-restarts-within = 5m
  }
}

# Slick database config for projections (shared with durable state)
dashboard-projection-db {
  profile = "slick.jdbc.PostgresProfile$"
  db = ${jdbc-durable-state-store.slick.db}
}

# ========================================
# Cluster formation via Kubernetes (multi-pod sharding)
# Started only when PEKKO_CLUSTER_BOOTSTRAP=on (see Main.scala). Inert
# otherwise — local/single-node dev keeps using pekko.cluster.seed-nodes.
# The k8s deploy also loads application-k8s.conf, which empties seed-nodes
# so Cluster Bootstrap (not static seeds) forms the cluster.
# ========================================
pekko {
  management {
    http {
      # Advertised host (contact point) + bind host for the management API.
      hostname = "127.0.0.1"
      hostname = ${?PEKKO_MGMT_HOST}   # pod IP in k8s (downward API)
      bind-hostname = "0.0.0.0"
      port = 8558
    }
    cluster.bootstrap {
      contact-point-discovery {
        service-name     = "promovolve-api"
        discovery-method = kubernetes-api
        # Minimum pods that must agree before forming a NEW cluster.
        required-contact-point-nr = 2
        required-contact-point-nr = ${?PEKKO_BOOTSTRAP_REQUIRED_CONTACT_POINTS}
      }
    }
  }

  discovery {
    kubernetes-api {
      # Peers = pods with this label (service-name fills %s →
      # app=promovolve-api) exposing a container port named "management".
      pod-label-selector = "app=%s"
      pod-port-name      = "management"
    }
  }
}

# ========================================
# HTTP Server
# ========================================
http {
  host = "0.0.0.0"
  host = ${?HTTP_HOST}

  port = 8080
  port = ${?HTTP_PORT}
}

# ========================================
# Dispatcher Isolation
# ========================================
# Each subsystem gets its own dispatcher so heavy workloads
# (auction recovery, LLM calls, entity passivation) cannot
# starve the serve/tracking hot path or UI interactions.

# Serve path: ad selection + tracking URL validation
# Must stay responsive — this is what publishers/users see.
serve-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-min = 4
    parallelism-factor = 2.0
    parallelism-max = 8
  }
  throughput = 10
}

# Auction & bidding: AuctioneerEntity, CategoryBidder, CampaignDistributor
# CPU-heavy, bursty after restart (thundering herd recovery).
auction-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 1.0
    parallelism-max = 4
  }
  throughput = 5
}

# Entity management: AdvertiserEntity, CampaignEntity, PublisherEntity, SiteEntity
# Moderate load — budget reconciliation, creative management, LLM classification.
entity-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 1.0
    parallelism-max = 4
  }
  throughput = 5
}

# Learning: TaxonomyRanker, ContentProductAffinity
# Background statistical updates — can tolerate higher latency.
learning-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-min = 1
    parallelism-factor = 0.5
    parallelism-max = 2
  }
  throughput = 10
}

# Crawler: Playwright page rendering (blocking I/O)
crawler-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 4
  }
  throughput = 1
}

# Each BrowserSession actor owns a Playwright instance, which is
# single-thread-per-instance — all API calls must happen on the
# thread that called Playwright.create(). PinnedDispatcher gives
# each actor its own dedicated thread for its lifetime.
browser-session-dispatcher {
  type = PinnedDispatcher
  executor = "thread-pool-executor"
}

# Blocking I/O: image storage, downloads, file I/O
blocking-io-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 4
  }
  throughput = 1
}

# ========================================
# Application Settings
# ========================================
promovolve {
  # LLM API for taxonomy classification (first configured provider wins: gemini > openai > anthropic)
  gemini {
    enabled = true
    api-key = ${?GEMINI_API_KEY}
    # Override via GEMINI_MODEL env var. Default in ClusterBootstrap
    # is gemini-2.5-flash; set this to switch without a code change.
    model = ${?GEMINI_MODEL}
  }
  openai {
    api-key = ${?OPENAI_API_KEY}
  }
  anthropic {
    api-key = ${?ANTHROPIC_API_KEY}
  }

  # Tracking & CDN
  tracking-base-url = "http://localhost:8080/v1"
  tracking-base-url = ${?TRACKING_BASE_URL}

  cdn-base-url = ${CDN_BASE_URL}

  # URL the <expandable-magazine-banner> web component is fetched from.
  # Required for creative rendering. Set by `npm run publish:r2` in
  # platform/banner-component, which writes the hashed CDN URL into
  # scripts/.env. If empty, the bootstrap can't load the banner web
  # component and the slot stays unfilled.
  banner-script-url = ""
  banner-script-url = ${?BANNER_SCRIPT_URL}

  # Enable /test/* routes (bid testing, direct spend tracking)
  # WARNING: these bypass validation — never enable in production
  enable-test-routes = false
  enable-test-routes = ${?ENABLE_TEST_ROUTES}

  # Advertiser-timezone pacing (real calendar days). When on, AdServer's
  # expected spend integrates the site's UTC traffic shape over each
  # campaign's advertiser-zone budget window (see PacingLogic
  # .computeAggregateExpectedSpend); off, or on with no advertiser zones set,
  # is behavior-identical to the legacy shared-UTC-day math. Kill switch on
  # the serve-death codepath — flip via env without a rebuild, roll pods.
  pacing {
    zone-aware = false
    zone-aware = ${?PACING_ZONE_AWARE}
  }

  # Replay guard for tracking URL deduplication
  # Uses fixed-size bloom filters - no heap bloat
  replay-guard {
    enabled = true
    enabled = ${?REPLAY_GUARD_ENABLED}

    # URL validity window (±this value for clock skew tolerance)
    # Bloom bucket = this + 1 min, coverage = 2× bucket
    # Example: 3 min → bucket=4 min → coverage=8 min > 6 min validity span
    url-validity-window = 3 minutes
    url-validity-window = ${?REPLAY_GUARD_URL_VALIDITY}

    # Number of bloom filter partitions (should be power of 2)
    partitions = 64
    partitions = ${?REPLAY_GUARD_PARTITIONS}

    # Expected unique nonces per partition per bucket (affects bloom filter size)
    expected-per-partition = 100000
    expected-per-partition = ${?REPLAY_GUARD_EXPECTED_PER_PARTITION}
  }

  # Fraud prevention (docs/design/FRAUD_PREVENTION.md). Layer 0 (request
  # hygiene) is always on — its detectors fail open until FRAUD_ASN_DB_PATH
  # provides a db. Layers 1 and 2 ship dark and are enabled per env so they
  # can be turned on independently once Layer 0 is proven stable.
  fraud {
    # Per-IP/site rate caps on the tracking beacon path (Layer 0).
    rate-per-sec = 20
    rate-per-sec = ${?FRAUD_RATE_PER_SEC}
    rate-burst = 60
    rate-burst = ${?FRAUD_RATE_BURST}

    # Layer 1: engagement-chain guard (impression→click→cta ordering +
    # sub-human server-side timing).
    engagement-guard {
      enabled = false
      enabled = ${?FRAUD_ENGAGEMENT_GUARD_ENABLED}
    }

    # Layer 2: economics detector (cluster-singleton hourly scan of
    # tracking_events × mount_beacons → fraud_flags). Needs the dashboard DB.
    detector {
      enabled = false
      enabled = ${?FRAUD_DETECTOR_ENABLED}
    }
  }

  # Pacing is always on (budget protection is not a toggle). There is
  # intentionally no PACING_ENABLED override — see ClusterBootstrap.

  # Simulation: compresses the campaign budget "day" so local scenario
  # testing (RunScenario --day-duration) can run many days fast. Default
  # 86400 = a real 24h day. NOT RL-related — the former `rl.day-duration-seconds`
  # / RL_DAY_DURATION_SECONDS name was a leftover from the removed RL floor
  # agent, and a stray export of it silently compressed budget days. Use
  # SIM_DAY_DURATION_SECONDS only when you actually want compressed days.
  sim {
    day-duration-seconds = 86400
    day-duration-seconds = ${?SIM_DAY_DURATION_SECONDS}
  }

  auction {
    # How often to re-auction all recent pages.
    # Override to pick up bid changes faster (e.g., 30s for simulation).
    reauction-interval = 5 minutes
    reauction-interval = ${?REAUCTION_INTERVAL}

    # Content-product affinity expansion: expand auction candidates
    # beyond the static IAB mapping using learned affinities.
    # Off by default — enable after affinity data has accumulated.
    enable-affinity-expansion = false
    enable-affinity-expansion = ${?ENABLE_AFFINITY_EXPANSION}
  }

  # Crawler-tier defaults. Content crawling has been removed (pages are
  # classified on-demand from real traffic); this namespace now only configures
  # the crawler-tier browser pool + the LP analysis workers (LPWorker), which
  # still run Playwright on crawler-role nodes for landing-page analysis.
  crawler {
    # LP analysis workers — the crawler-tier offload of landing-page Playwright
    # analysis (LPWorker). Each LP analysis is heavy (full stepped scroll) and
    # holds a browser session for its whole duration, so default
    # max-concurrent-per-worker = 1.
    lp-workers {
      # Phase-1 gate: when true, the analyze-lp API dispatches to the
      # crawler-tier LPWorker instead of the in-process LPAnalyzer. The shard
      # region + keep-alive stand up regardless (so allocation can be validated
      # with the flag still off).
      enabled = false
      enabled = ${?LP_WORKERS_ENABLED}
      num-workers = 4
      num-workers = ${?LP_NUM_WORKERS}
      max-concurrent-per-worker = 1
      max-concurrent-per-worker = ${?LP_MAX_CONCURRENT_PER_WORKER}
      stale-after = 5 minutes
      sweep-interval = 1 minute
      keep-alive-interval = 30 seconds
    }

    # Shared-browser pool: node-local pool of BrowserSession actors.
    # Each session owns ONE Playwright + ONE Chromium process pinned
    # to its own dispatcher thread (Playwright Java is single-threaded
    # per instance). All crawlers on this node route ScrapePage
    # requests through this pool, so total Chromium count = size,
    # regardless of how many concurrent crawls are in flight.
    #
    # Memory rule of thumb: ~250-400 MB resident per Chromium process,
    # plus the Node driver. Default size=4 → ~1-1.5 GB.
    browser-pool {
      size = 4
      size = ${?CRAWLER_BROWSER_POOL_SIZE}
      # Sessions reserved exclusively for interactive designer work (LP
      # analysis / banner screenshots) so the creative designer never
      # queues behind a background crawl. Clamped so the crawler keeps at
      # least one session (with size=4 + reserved=1, crawler gets 3).
      designer-reserved-sessions = 1
      designer-reserved-sessions = ${?CRAWLER_DESIGNER_RESERVED_SESSIONS}
      # Rotate the BrowserContext after this many successful scrapes
      # on a session, to bound Chromium memory drift. Browser stays up.
      context-rotation-every = 5
      context-rotation-every = ${?CRAWLER_CONTEXT_ROTATION_EVERY}
      # Eagerly launch Chromium on every session so the first crawl/LP job is
      # warm (no cold-launch latency). The warmup is deferred until the node
      # has JOINED the cluster (SelfUp) — launching it at boot competed with
      # cluster-bootstrap probing and delayed crawler registration. Off by
      # default (keeps the entity tier lean — the pool runs on every node);
      # enable on the dedicated crawler tier via CRAWLER_BROWSER_WARM_ON_START=true.
      warm-on-start = false
      warm-on-start = ${?CRAWLER_BROWSER_WARM_ON_START}
    }
  }

  # IAB LEAN Ad Limits
  # See: https://www.iab.com/wp-content/uploads/2019/04/IABNewAdPortfolio_LW_FixedSizeSpec.pdf
  image-limits {
    # Max file size for initial load (static images)
    max-file-size = 50 KiB
    max-file-size = ${?IMAGE_MAX_FILE_SIZE}

    # Optional: override allowed sizes (defaults to IAB standard sizes)
    # allowed-sizes = ["300x250", "728x90", "320x50"]
  }

  # ----------------------------------------
  # Taxonomy Ranker (Thompson Sampling) Settings
  # ----------------------------------------
  # Uses Thompson Sampling for probabilistic category selection.
  # No hard viability thresholds - exploration/exploitation is automatic
  # via Beta distribution sampling.
  taxonomy-ranker {
    # Decay half-life for time-weighted statistics
    half-life = 7 days
    half-life = ${?TAXONOMY_RANKER_HALF_LIFE}

    # Beta distribution priors for CTR Thompson Sampling
    # Uses Beta(alpha, beta) as prior for CTR estimation
    # alpha = pseudo-clicks, beta = pseudo-non-clicks
    # alpha=1, beta=1 gives uniform prior (neutral)
    prior-alpha = 1.0
    prior-alpha = ${?TAXONOMY_RANKER_PRIOR_ALPHA}
    prior-beta = 1.0
    prior-beta = ${?TAXONOMY_RANKER_PRIOR_BETA}

    # How often to flush buffered state to DB
    flush-every = 5 seconds
    flush-every = ${?TAXONOMY_RANKER_FLUSH_EVERY}

  }

  # Content-Product Affinity: learned associations between page content and ad products.
  # Uses Thompson Sampling (same as taxonomy-ranker) to track which
  # (contentCategory, adProductCategory) pairs produce clicks.
  content-product-affinity {
    half-life = 7 days
    half-life = ${?AFFINITY_HALF_LIFE}
    prior-alpha = 1.0
    prior-beta = 1.0
    flush-every = 5 seconds
    flush-every = ${?AFFINITY_FLUSH_EVERY}
  }

  # Floor-CPM sweep optimizer per SiteEntity. Holds each candidate floor
  # for one observation window, measures realized revenue, picks argmax.
  # See FloorSweepOptimizer.scala.
  floor-optimizer {
    # Sweep tuning. The sweep
    # spends (candidate-count × ticks-per-candidate) ticks probing and
    # exploit-ticks parked on the chosen floor. Keep exploit ≫ sweep:
    # with a dominant bidder, every low-floor probing tick hands that
    # bidder the cheap second price instead of a binding reserve, so a
    # probe-heavy duty cycle leaks revenue and makes the floor graph
    # ramp up and down. Defaults below put ~65% of ticks on the winner.
    candidate-count     = 8
    candidate-count     = ${?FLOOR_SWEEP_CANDIDATE_COUNT}
    ticks-per-candidate = 4
    ticks-per-candidate = ${?FLOOR_SWEEP_TICKS_PER_CANDIDATE}
    exploit-ticks       = 60
    exploit-ticks       = ${?FLOOR_SWEEP_EXPLOIT_TICKS}
    min-imps-for-argmax = 3
    min-imps-for-argmax = ${?FLOOR_SWEEP_MIN_IMPS_FOR_ARGMAX}

    # Near-tie band (fraction). Under second-price clearing a wide range
    # of floors earns nearly identical revenue (many cheap impressions ≈
    # a few expensive ones), so the strict argmax flip-flops across that
    # plateau on noise. Among well-evidenced candidates within this band
    # of the best, the optimizer prefers the HIGHER floor — same revenue,
    # fewer impressions, no flip-flop. 0.0 disables (exact-tie only).
    tie-tolerance       = 0.05
    tie-tolerance       = ${?FLOOR_SWEEP_TIE_TOLERANCE}
  }
}